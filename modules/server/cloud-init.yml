#cloud-config
package_update: true
package_upgrade: true

packages:
  - fail2ban
  - ufw
  - curl
  - git
  - buildah

users:
  - name: ${ssh_user}
    groups: [sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ${ssh_pub_key}

write_files:
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      ${indent(6, sshd_config)}
  - path: /etc/fail2ban/jail.local
    content: |
      ${indent(6, fail2ban_config)}
  - path: /tmp/fcm-push-build/Dockerfile
    content: |
      FROM node:22-alpine
      WORKDIR /app
      COPY index.js .
      CMD ["node", "index.js"]
  - path: /tmp/fcm-push-build/index.js
    content: |
      ${indent(6, fcm_push_index_js)}

runcmd:
  # SSH hardening
  - rm -f /etc/ssh/sshd_config.d/50-cloud-init.conf
  - systemctl disable --now ssh.socket || true
  - systemctl enable ssh.service
  - systemctl restart ssh.service
  - systemctl enable fail2ban
  - systemctl restart fail2ban

  # Firewall
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow ${ssh_port}/tcp
  - ufw --force enable

  # Install k3s (without Traefik — we use Cloudflare Tunnel)
  - curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable=traefik --write-kubeconfig-mode=644" sh -

  # Wait for k3s to be ready
  - |
    for i in $(seq 1 60); do
      /usr/local/bin/kubectl get nodes 2>/dev/null && break
      sleep 5
    done

  # Install cloudflared
  - curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
  - dpkg -i /tmp/cloudflared.deb
  - rm /tmp/cloudflared.deb
  - cloudflared service install ${tunnel_token}
  - systemctl enable cloudflared
  - systemctl start cloudflared

  # Build OpenClaw image with buildah and import to k3s
  - |
    git clone --depth 1 --branch ${openclaw_version} https://github.com/openclaw/openclaw.git /tmp/openclaw-build
    cd /tmp/openclaw-build
    buildah bud -t localhost/openclaw:latest .
    buildah push localhost/openclaw:latest docker-archive:/tmp/openclaw.tar:localhost/openclaw:latest
    k3s ctr images import /tmp/openclaw.tar
    rm -rf /tmp/openclaw-build /tmp/openclaw.tar

  # Build fcm-push image with buildah and import to k3s
  - |
    cd /tmp/fcm-push-build
    buildah bud -t localhost/fcm-push:latest .
    buildah push localhost/fcm-push:latest docker-archive:/tmp/fcm-push.tar:localhost/fcm-push:latest
    k3s ctr images import /tmp/fcm-push.tar
    rm -rf /tmp/fcm-push-build /tmp/fcm-push.tar

  # Signal provisioning complete
  - touch /opt/openclaw-ready
