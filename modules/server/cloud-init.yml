#cloud-config
package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose-v2
  - fail2ban
  - ufw
  - curl

users:
  - name: ${ssh_user}
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ${ssh_pub_key}

write_files:
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      ${indent(6, sshd_config)}
  - path: /etc/fail2ban/jail.local
    content: |
      ${indent(6, fail2ban_config)}
  - path: /opt/openclaw/docker-compose.yml
    content: |
      ${indent(6, docker_compose)}
  - path: /opt/openclaw/openclaw.json
    content: |
      ${indent(6, openclaw_config)}
%{ if cron_jobs_config != "" ~}
  - path: /opt/openclaw/cron-jobs.json
    content: |
      ${indent(6, cron_jobs_config)}
%{ endif ~}

runcmd:
  - systemctl enable docker
  - systemctl start docker

  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow ${ssh_port}/tcp
  - ufw --force enable

  - rm -f /etc/ssh/sshd_config.d/50-cloud-init.conf
  - systemctl disable --now ssh.socket || true
  - systemctl enable ssh.service
  - systemctl restart ssh.service

  - systemctl enable fail2ban
  - systemctl restart fail2ban

  - curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
  - dpkg -i /tmp/cloudflared.deb
  - rm /tmp/cloudflared.deb

  - cloudflared service install ${tunnel_token}
  - systemctl enable cloudflared
  - systemctl start cloudflared

  - chown -R ${ssh_user}:docker /opt/openclaw
  - touch /opt/openclaw/.env
  - cd /opt/openclaw && docker compose --env-file /opt/openclaw/.env up -d
  - |
    # Wait for OpenClaw to create its data directory, then inject config
    sleep 15
    OPENCLAW_DATA=$(docker volume inspect openclaw_openclaw_data --format '{{.Mountpoint}}')
    if [ -n "$OPENCLAW_DATA" ] && [ ! -f "$OPENCLAW_DATA/openclaw.json" ]; then
      cp /opt/openclaw/openclaw.json "$OPENCLAW_DATA/openclaw.json"
      chown 1000:1000 "$OPENCLAW_DATA/openclaw.json"
      # Inject cron jobs if configured
      if [ -f /opt/openclaw/cron-jobs.json ]; then
        mkdir -p "$OPENCLAW_DATA/cron"
        cp /opt/openclaw/cron-jobs.json "$OPENCLAW_DATA/cron/jobs.json"
        chown -R 1000:1000 "$OPENCLAW_DATA/cron"
      fi
      cd /opt/openclaw && docker compose restart openclaw
    fi
